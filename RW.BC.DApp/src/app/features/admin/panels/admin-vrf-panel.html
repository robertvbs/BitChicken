<div class="flex flex-col gap-6 pt-4">

  <p-fieldset [legend]="'admin.forge.vrfConfig' | translate" [toggleable]="true">
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
      <div class="flex flex-col gap-1">
        <label class="text-sm font-medium">{{ 'admin.forge.keyHash' | translate }}</label>
        <input pInputText [ngModel]="vrfKeyHash()" (ngModelChange)="vrfKeyHash.set($event)" placeholder="0x..." />
      </div>
      <div class="flex flex-col gap-1">
        <label class="text-sm font-medium">{{ 'admin.forge.subId' | translate }}</label>
        <p-inputnumber [ngModel]="vrfSubId()" (ngModelChange)="vrfSubId.set($event ?? 0)" [min]="0" />
      </div>
      <div class="flex flex-col gap-1">
        <label class="text-sm font-medium">{{ 'admin.forge.callbackGasLimit' | translate }}</label>
        <p-inputnumber [ngModel]="vrfCallbackGasLimit()" (ngModelChange)="vrfCallbackGasLimit.set($event ?? 200000)" [min]="0" />
      </div>
      <div class="flex flex-col gap-1">
        <label class="text-sm font-medium">{{ 'admin.forge.requestConfirmations' | translate }}</label>
        <p-inputnumber [ngModel]="vrfRequestConfirmations()" (ngModelChange)="vrfRequestConfirmations.set($event ?? 3)" [min]="1" [max]="200" />
      </div>
      <div class="md:col-span-2">
        <app-transaction-widget [phase]="tx.txPhase()" ctaKey="admin.forge.setVRFConfig" [disabled]="isBusy()" (confirm)="forgeSetVRFConfig()" />
      </div>
    </div>
  </p-fieldset>

</div>
