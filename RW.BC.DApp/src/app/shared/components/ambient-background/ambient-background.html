<div class="bc-ambient" [class.bc-ambient--night]="theme.isDark()" aria-hidden="true">
  <div class="bc-day">
    <div class="bc-day__sky"></div>
    <div class="bc-sun"></div>
    <span class="bc-cloud bc-cloud--1"></span>
    <span class="bc-cloud bc-cloud--2"></span>
    <span class="bc-cloud bc-cloud--3"></span>
  </div>

  <div class="bc-night">
    <div class="bc-night__sky"></div>
    <div class="bc-stars"></div>
    <div class="bc-moon"></div>
    <div class="bc-shooting bc-shooting--1"><span class="bc-shooting__streak"></span></div>
    <span class="bc-firefly bc-firefly--1"></span>
    <span class="bc-firefly bc-firefly--2"></span>
    <span class="bc-firefly bc-firefly--3"></span>
    <div class="bc-planet"></div>
  </div>

  <div class="bc-ground" [class.bc-ground--night]="theme.isDark()">
    <svg class="bc-hills" viewBox="0 0 1440 220" preserveAspectRatio="none" aria-hidden="true">
      <path class="bc-hill bc-hill--back" d="M0,118 C240,58 480,92 720,100 C960,108 1200,66 1440,108 L1440,220 L0,220 Z" />
      <path class="bc-hill bc-hill--mid" d="M0,158 C260,108 520,150 760,150 C1000,150 1240,118 1440,154 L1440,220 L0,220 Z" />
      <path class="bc-hill bc-hill--front" d="M0,194 C300,164 600,200 900,194 C1140,190 1320,200 1440,188 L1440,220 L0,220 Z" />
    </svg>

    <svg class="bc-struct bc-turbine bc-turbine--1" viewBox="0 0 60 116" width="48" height="93" aria-hidden="true">
      <rect class="bc-struct__body" x="28.5" y="38" width="3" height="74" />
      <g transform="translate(30,38)">
        <g class="bc-rotor bc-rotor--a">
          <path class="bc-struct__body" d="M0,0 L-2,-3 L-0.8,-30 L0.8,-30 L2,-3 Z" />
          <path class="bc-struct__body" d="M0,0 L-2,-3 L-0.8,-30 L0.8,-30 L2,-3 Z" transform="rotate(120)" />
          <path class="bc-struct__body" d="M0,0 L-2,-3 L-0.8,-30 L0.8,-30 L2,-3 Z" transform="rotate(240)" />
          <circle class="bc-struct__body" r="2.6" />
        </g>
      </g>
    </svg>

    <svg class="bc-struct bc-turbine bc-turbine--2" viewBox="0 0 60 116" width="60" height="116" aria-hidden="true">
      <rect class="bc-struct__body" x="28.5" y="38" width="3" height="74" />
      <g transform="translate(30,38)">
        <g class="bc-rotor bc-rotor--b">
          <path class="bc-struct__body" d="M0,0 L-2,-3 L-0.8,-30 L0.8,-30 L2,-3 Z" />
          <path class="bc-struct__body" d="M0,0 L-2,-3 L-0.8,-30 L0.8,-30 L2,-3 Z" transform="rotate(120)" />
          <path class="bc-struct__body" d="M0,0 L-2,-3 L-0.8,-30 L0.8,-30 L2,-3 Z" transform="rotate(240)" />
          <circle class="bc-struct__body" r="2.6" />
        </g>
      </g>
    </svg>

    <svg class="bc-struct bc-dome" viewBox="0 0 84 54" width="84" height="54" aria-hidden="true">
      <path class="bc-struct__body" d="M8,48 A34,30 0 0 1 76,48 Z" />
      <rect class="bc-struct__body" x="6" y="46" width="72" height="7" rx="2" />
      <rect class="bc-struct__window" x="32" y="30" width="20" height="15" rx="2" />
    </svg>

    <svg class="bc-struct bc-antenna" viewBox="0 0 40 120" width="32" height="96" aria-hidden="true">
      <path class="bc-struct__body" d="M20,10 L26,112 L14,112 Z" />
      <rect class="bc-struct__body" x="15" y="44" width="10" height="2.4" />
      <rect class="bc-struct__body" x="16.5" y="74" width="7" height="2.4" />
      <circle class="bc-beacon" cx="20" cy="9" r="3" />
    </svg>
  </div>
</div>
