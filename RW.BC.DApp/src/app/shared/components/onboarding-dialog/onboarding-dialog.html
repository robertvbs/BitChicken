<p-dialog
  [header]="'onboarding.title' | translate"
  [visible]="visible()"
  (visibleChange)="visible.set($event)"
  [modal]="true"
  [dismissableMask]="true"
  [style]="{ width: '32rem' }"
  [breakpoints]="{ '575px': '90vw' }"
>
  <div class="flex flex-col gap-3">
    <p class="text-muted-color">{{ 'onboarding.intro' | translate }}</p>
    <ul class="flex flex-col gap-2">
      @for (step of steps; track step) {
        <li class="flex items-start gap-2">
          <i class="pi pi-check-circle text-primary mt-1"></i>
          <span>{{ step | translate }}</span>
        </li>
      }
    </ul>
  </div>
  <ng-template #footer>
    <p-button [label]="'onboarding.cta' | translate" icon="pi pi-arrow-right" (onClick)="close()" />
  </ng-template>
</p-dialog>
