<p-dialog
  [visible]="visible"
  [header]="'auth.walletLink.title' | translate"
  [closable]="false"
  [modal]="true"
  [draggable]="false"
  [resizable]="false"
  styleClass="w-full max-w-md"
>
  <div class="flex flex-col gap-4">
    <p class="text-sm text-color-secondary">{{ 'auth.walletLink.description' | translate }}</p>

    @if (error()) {
      <p-message severity="error" styleClass="w-full">
        {{ error()! | translate }}
      </p-message>
    }

    <div class="flex gap-2 justify-end pt-2">
      <p-button
        [label]="'common.cancel' | translate"
        severity="secondary"
        [text]="true"
        [disabled]="walletLink.linking()"
        (onClick)="cancel()"
      />
      <p-button
        [label]="'auth.walletLink.cta' | translate"
        [loading]="walletLink.linking()"
        (onClick)="confirm()"
      />
    </div>
  </div>
</p-dialog>
